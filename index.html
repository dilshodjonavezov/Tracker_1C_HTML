// Start marker
function makeIcon(color, size) {
  return L.divIcon({
    className: '',
    html: `<div style="width:${size}px;height:${size}px;background:${color};border:2px solid #000;border-radius:50%;box-shadow:0 0 8px ${color}88"></div>`,
    iconAnchor: [size/2, size/2]
  });
}

L.marker(parsed[0], { icon: makeIcon('#00ff88', 14) })
  .bindPopup('<b style="color:#00ff88">🟢 Старт</b><br>' + parsed[0][0].toFixed(5) + ', ' + parsed[0][1].toFixed(5))
  .addTo(map);

L.marker(parsed[parsed.length-1], { icon: makeIcon('#ff4444', 14) })
  .bindPopup('<b style="color:#ff4444">🔴 Финиш</b><br>' + parsed[parsed.length-1][0].toFixed(5) + ', ' + parsed[parsed.length-1][1].toFixed(5))
  .addTo(map);

// Stats
function haversine(a, b) {
  const R = 6371, dLat = (b[0]-a[0])*Math.PI/180, dLon = (b[1]-a[1])*Math.PI/180;
  const x = Math.sin(dLat/2)**2 + Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}
let dist = 0;
for (let i = 1; i < parsed.length; i++) dist += haversine(parsed[i-1], parsed[i]);

document.getElementById('statPoints').textContent = parsed.length;
document.getElementById('statDist').textContent = dist.toFixed(1);
